name: disasterops-env
version: 1.0.0
description: >
  Emergency Disaster Response & Resource Coordination Environment.
  Agent plays an EOC Coordinator managing multi-agency disaster response —
  allocating limited resources, evacuating populations, and handling
  cascading secondary events under time pressure.

author: Kushagra Goyal
license: MIT

entrypoint:
  type: http
  url: http://localhost:7860

tasks:
  - id: disaster-001-flood
    description: "Easy: River flood in 3 residential zones. Plenty of resources, all roads open."
  - id: disaster-002-earthquake
    description: "Medium: 6.5 earthquake with aftershock at step 5. 6 zones affected. Blocked roads."
  - id: disaster-003-hurricane
    description: "Hard: Cat-4 hurricane with dam breach risk. Helicopters grounded. Preemptive evacuation required."
  - id: disaster-004-cascading
    description: "Expert: Earthquake + chemical spill + dam breach. Multi-hazard. Fog of war."
  - id: disaster-005-megadisaster
    description: "Nightmare: 8.1 earthquake + tsunami. 15 zones, minimal resources. Cannot save everyone."
